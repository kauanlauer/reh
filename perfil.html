<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#db2777">
    <title>Meu Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { 50: '#fdf2f8', 100: '#fce7f3', 500: '#ec4899', 600: '#db2777', 700: '#be185d' } },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <script>
        // --- CONFIGURAÇÃO ---
        const firebaseConfig = {
            apiKey: "AIzaSyCM9tMvnRV-o7X66euCBKuLmuz-kIrClWY",
            authDomain: "renata-26079.firebaseapp.com",
            projectId: "renata-26079",
            storageBucket: "renata-26079.firebasestorage.app",
            messagingSenderId: "995787482442",
            appId: "1:995787482442:web:fdbca404a0e251cc278db3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        document.addEventListener('DOMContentLoaded', () => {
            // Login Anônimo para poder acessar o banco
            auth.onAuthStateChanged(user => { if (!user) auth.signInAnonymously(); });

            // Verifica se já está logado no navegador
            const savedPhone = localStorage.getItem('userPhone');
            const savedName = localStorage.getItem('userName');

            if (savedPhone && savedName) {
                mostrarTela('tela-logado');
                document.getElementById('nome-display').innerText = savedName;
                document.getElementById('tel-display').innerText = formatarTelefoneDisplay(savedPhone);
            } else {
                mostrarTela('tela-escolha');
            }

            // --- MÁSCARA DE TELEFONE (Visual App) ---
            const inputsFone = document.querySelectorAll('.input-fone');
            inputsFone.forEach(input => {
                input.addEventListener('input', (e) => {
                    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                    e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
                });
            });
        });

        // --- NAVEGAÇÃO ENTRE TELAS ---
        function mostrarTela(idTela) {
            // Esconde todas
            ['tela-escolha', 'tela-login', 'tela-cadastro', 'tela-logado'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            // Mostra a desejada com animação
            const tela = document.getElementById(idTela);
            tela.classList.remove('hidden');
            tela.classList.add('animate-fade-in');
        }

        // --- AÇÃO 1: LOGIN (Já sou cliente) ---
        window.fazerLogin = async () => {
            const btn = document.getElementById('btn-login');
            const input = document.getElementById('fone-login');
            const feedback = document.getElementById('feedback-login');
            
            const foneLimpo = input.value.replace(/\D/g, '');

            if (foneLimpo.length < 10) {
                mostrarToast("Digite um número válido com DDD", "erro");
                return;
            }

            btn.innerHTML = "Buscando...";
            btn.disabled = true;
            feedback.classList.add('hidden');

            try {
                // Busca EXATA pelo número limpo
                const snapshot = await db.collection('clientes')
                    .where('telefone_limpo', '==', foneLimpo)
                    .get();

                if (!snapshot.empty) {
                    // SUCESSO: Usuário encontrado
                    const dados = snapshot.docs[0].data();
                    
                    // Salva no navegador
                    localStorage.setItem('userPhone', dados.telefone_limpo);
                    localStorage.setItem('userName', dados.nome);

                    mostrarToast(`Bem-vindo de volta, ${dados.nome}!`, "sucesso");
                    
                    setTimeout(() => {
                        window.location.href = "pedidos.html"; // Vai para pedidos
                    }, 1500);
                } else {
                    // ERRO: Não achou
                    feedback.innerHTML = `Não encontramos cadastro com este número. <br><span onclick="mostrarTela('tela-cadastro')" class="underline cursor-pointer font-bold">Clique aqui para criar conta.</span>`;
                    feedback.classList.remove('hidden');
                    btn.innerHTML = "Buscar Cadastro";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                mostrarToast("Erro de conexão. Tente novamente.", "erro");
                btn.innerHTML = "Buscar Cadastro";
                btn.disabled = false;
            }
        }

        // --- AÇÃO 2: CADASTRO (Sou novo) ---
        window.fazerCadastro = async () => {
            const btn = document.getElementById('btn-cadastro');
            const nomeInput = document.getElementById('nome-cadastro');
            const foneInput = document.getElementById('fone-cadastro');
            
            const nome = nomeInput.value.trim();
            const foneLimpo = foneInput.value.replace(/\D/g, '');

            if (nome.length < 2 || foneLimpo.length < 10) {
                mostrarToast("Preencha nome e telefone corretamente.", "erro");
                return;
            }

            btn.innerHTML = "Salvando...";
            btn.disabled = true;

            try {
                // 1. Verifica se JÁ EXISTE antes de criar (Evita duplicidade)
                const check = await db.collection('clientes')
                    .where('telefone_limpo', '==', foneLimpo)
                    .get();

                if (!check.empty) {
                    // JÁ EXISTE: Atualiza o nome e avisa
                    const docId = check.docs[0].id;
                    await db.collection('clientes').doc(docId).update({
                        nome: nome,
                        ultimo_acesso: new Date().toISOString()
                    });
                    mostrarToast("Você já tinha cadastro! Atualizamos seus dados.", "sucesso");
                } else {
                    // NOVO: Cria do zero
                    await db.collection('clientes').add({
                        nome: nome,
                        telefone: foneInput.value, // Visual
                        telefone_limpo: foneLimpo, // Busca
                        data_cadastro: new Date().toISOString(),
                        ultimo_acesso: new Date().toISOString()
                    });
                    mostrarToast("Cadastro criado com sucesso!", "sucesso");
                }

                // Salva e Redireciona
                localStorage.setItem('userPhone', foneLimpo);
                localStorage.setItem('userName', nome);
                
                setTimeout(() => {
                    window.location.href = "index.html"; // Vai para o cardápio pedir
                }, 1500);

            } catch (error) {
                console.error(error);
                mostrarToast("Erro ao salvar: " + error.message, "erro");
                btn.innerHTML = "Criar Conta";
                btn.disabled = false;
            }
        }

        // --- AÇÃO 3: SAIR (Logout) ---
        window.sair = () => {
            if(confirm("Deseja desconectar deste aparelho?")) {
                localStorage.removeItem('userPhone');
                localStorage.removeItem('userName');
                location.reload();
            }
        }

        // Utils
        function mostrarToast(msg, tipo) {
            const el = document.getElementById('toast');
            const cor = tipo === 'sucesso' ? 'text-green-400' : 'text-red-400';
            const icone = tipo === 'sucesso' ? '✓' : '✕';
            
            el.innerHTML = `<span class="${cor} text-lg mr-3 font-bold">${icone}</span> ${msg}`;
            el.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => el.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function formatarTelefoneDisplay(v) {
            v = v.replace(/\D/g, '');
            return v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        }

    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white p-4 shadow-sm flex justify-center items-center z-10">
        <h1 class="text-lg font-serif font-bold text-brand-600">Delicia D'Brownie</h1>
    </header>

    <!-- Conteúdo Centralizado -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto">

        <!-- TELA 1: ESCOLHA INICIAL -->
        <div id="tela-escolha" class="w-full text-center animate-fade-in">
            <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                <svg class="w-12 h-12 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Olá! 👋</h2>
            <p class="text-gray-500 mb-8">Identifique-se para ver seus pedidos e facilitar suas compras.</p>
            
            <div class="space-y-3">
                <button onclick="mostrarTela('tela-login')" class="w-full bg-white border-2 border-brand-500 text-brand-600 font-bold py-4 rounded-xl shadow-sm hover:bg-brand-50 active:scale-95 transition">
                    Já sou cliente
                </button>
                <button onclick="mostrarTela('tela-cadastro')" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-200 hover:bg-brand-700 active:scale-95 transition">
                    Criar conta nova
                </button>
            </div>
        </div>

        <!-- TELA 2: LOGIN (Só telefone) -->
        <div id="tela-login" class="w-full hidden animate-slide-up">
            <button onclick="mostrarTela('tela-escolha')" class="mb-6 text-gray-400 hover:text-gray-600 flex items-center text-sm font-bold">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg> Voltar
            </button>
            
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Acessar Conta</h2>
            <p class="text-gray-500 text-sm mb-6">Informe seu WhatsApp cadastrado.</p>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Seu WhatsApp</label>
                    <input type="tel" id="fone-login" class="input-fone w-full p-4 bg-white border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-lg font-bold text-gray-800 tracking-wide placeholder-gray-300" placeholder="(00) 00000-0000">
                </div>

                <div id="feedback-login" class="hidden bg-red-50 text-red-600 text-xs p-3 rounded-lg text-center"></div>

                <button id="btn-login" onclick="fazerLogin()" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition mt-2">
                    Buscar Cadastro
                </button>
            </div>
        </div>

        <!-- TELA 3: CADASTRO (Nome + Telefone) -->
        <div id="tela-cadastro" class="w-full hidden animate-slide-up">
            <button onclick="mostrarTela('tela-escolha')" class="mb-6 text-gray-400 hover:text-gray-600 flex items-center text-sm font-bold">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg> Voltar
            </button>

            <h2 class="text-2xl font-bold text-gray-900 mb-1">Criar Conta</h2>
            <p class="text-gray-500 text-sm mb-6">É rapidinho, só precisamos do básico.</p>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Seu Nome</label>
                    <input type="text" id="nome-cadastro" class="w-full p-4 bg-white border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition font-medium" placeholder="Ex: Maria Silva">
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Seu WhatsApp</label>
                    <input type="tel" id="fone-cadastro" class="input-fone w-full p-4 bg-white border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-lg font-bold text-gray-800 tracking-wide" placeholder="(00) 00000-0000">
                </div>

                <button id="btn-cadastro" onclick="fazerCadastro()" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition mt-2">
                    Criar Conta
                </button>
            </div>
        </div>

        <!-- TELA 4: JÁ LOGADO (Perfil) -->
        <div id="tela-logado" class="w-full hidden text-center animate-fade-in">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900">Identificado!</h2>
            <p class="text-gray-500 text-sm mb-8">Você está conectado como:</p>
            
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                <p class="text-xs text-gray-400 uppercase font-bold mb-1">Nome</p>
                <p id="nome-display" class="text-xl font-bold text-gray-800 mb-4">...</p>
                
                <div class="w-full h-px bg-gray-100 mb-4"></div>
                
                <p class="text-xs text-gray-400 uppercase font-bold mb-1">Telefone</p>
                <p id="tel-display" class="text-lg font-medium text-gray-600">...</p>
            </div>

            <button onclick="sair()" class="text-red-500 font-bold text-sm hover:text-red-700 py-2 px-4 border border-red-100 rounded-lg bg-red-50 transition">
                Desconectar / Sair
            </button>
        </div>

    </main>

    <!-- Toast Flutuante -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-900/95 text-white px-6 py-3.5 rounded-full shadow-2xl z-50 text-sm font-medium transition-all duration-500 translate-y-[-100px] opacity-0 flex items-center whitespace-nowrap backdrop-blur-md"></div>

    <!-- Bottom Nav -->
    <footer class="bg-white border-t border-gray-100 z-40 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
        <nav class="flex justify-around items-center p-1">
            <a href="index.html" class="flex flex-col items-center w-16 py-2 text-gray-400 hover:text-brand-600 transition active:scale-90">
                <svg class="h-6 w-6 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                <span class="text-[10px] font-medium">Início</span>
            </a>
            <a href="pedidos.html" class="flex flex-col items-center w-16 py-2 text-gray-400 hover:text-brand-600 transition active:scale-90">
                <svg class="h-6 w-6 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <span class="text-[10px] font-medium">Pedidos</span>
            </a>
            <a href="perfil.html" class="flex flex-col items-center w-16 py-2 text-brand-600">
                <div id="avatar-letra" class="h-6 w-6 mb-0.5 rounded-full bg-brand-100 flex items-center justify-center text-xs font-bold text-brand-600 border border-brand-200">?</div>
                <span class="text-[10px] font-bold">Perfil</span>
            </a>
        </nav>
    </footer>

</body>
</html>
