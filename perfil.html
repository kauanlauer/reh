<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#db2777">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Meu Clube | Delicia D'Brownie</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 500: '#f43f5e', 600: '#db2777', 800: '#9f1239' } },
                    fontFamily: { sans: ['DM Sans'], serif: ['Playfair Display'] }
                }
            }
        }
    </script>

    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .stamp-animation { animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: scale(0) rotate(-45deg); }
        @keyframes stampIn { 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
    </style>
</head>
<body class="bg-gray-50 pb-24 min-h-screen">

    <!-- HEADER -->
    <div class="bg-brand-600 pb-16 pt-8 px-6 rounded-b-[3rem] shadow-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <div class="absolute top-[-20px] right-[-20px] w-40 h-40 rounded-full bg-white blur-3xl"></div>
            <div class="absolute bottom-[-20px] left-[-20px] w-40 h-40 rounded-full bg-white blur-3xl"></div>
        </div>

        <div class="relative z-10 flex justify-between items-center mb-6">
            <a href="index.html" class="text-white/80 hover:text-white transition">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="text-white font-serif font-bold text-xl">Minha Conta</h1>
            <div class="w-6"></div>
        </div>

        <div class="relative z-10 text-center mb-4">
            <div class="w-24 h-24 bg-white p-1 rounded-full mx-auto shadow-xl mb-3 relative group cursor-pointer">
                <img id="user-photo" src="https://ui-avatars.com/api/?name=User&background=random" class="w-full h-full rounded-full object-cover">
                <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-white"></div>
            </div>
            <h2 id="user-name-display" class="text-white font-bold text-2xl tracking-tight">Visitante</h2>
            <p id="user-phone-display" class="text-brand-200 text-sm font-medium">--</p>
        </div>
    </div>

    <!-- CARTÃO FIDELIDADE -->
    <div class="px-4 -mt-12 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="font-black text-gray-800 text-lg uppercase tracking-wide">Cartão Fidelidade</h3>
                    <p class="text-xs text-gray-400">Complete 10 pedidos e ganhe um prêmio!</p>
                </div>
                <div class="bg-brand-50 text-brand-600 px-3 py-1 rounded-full text-xs font-bold border border-brand-100">
                    <span id="pontos-txt">0</span>/10
                </div>
            </div>

            <!-- GRID DE SELOS -->
            <div class="grid grid-cols-5 gap-3 mb-6" id="stamps-grid">
                <!-- Injetado via JS -->
            </div>

            <div id="premio-box" class="hidden bg-gradient-to-r from-yellow-400 to-orange-500 text-white p-4 rounded-xl shadow-lg text-center animate-pulse">
                <p class="font-bold text-sm mb-1">🎉 PARABÉNS! VOCÊ GANHOU!</p>
                <p class="text-xs opacity-90">Mostre essa tela na loja para retirar seu prêmio.</p>
            </div>
        </div>
    </div>

    <!-- FORMULÁRIO LOGIN/DADOS -->
    <div class="px-6 mt-8 max-w-md mx-auto">
        <form id="profile-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Seu Nome</label>
                <input type="text" id="nome" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-medium text-gray-800 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all" placeholder="Como quer ser chamado?">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">WhatsApp (Celular)</label>
                <input type="tel" id="telefone" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-medium text-gray-800 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all" placeholder="(41) 99999-9999">
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                Salvar Dados
            </button>
        </form>

        <button onclick="logout()" class="w-full mt-4 text-red-500 text-sm font-bold py-3 hover:bg-red-50 rounded-xl transition">
            Sair da Conta
        </button>
    </div>

    <script src="firebase-init.js"></script>
    <script src="cliente-session.js"></script>
    <script>
        const clienteSession = window.ClienteSession;
        const db = window.db;
        const auth = window.auth;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!db || !auth || !clienteSession) {
                alert('Erro ao iniciar o perfil. Recarregue a página.');
                return;
            }

            auth.onAuthStateChanged(user => {
                if (!user) auth.signInAnonymously();
            });

            await loadUserData();
        });

        function preencherUI(cliente) {
            if (!cliente) {
                renderStamps(0);
                return;
            }

            const nome = cliente.nome || '';
            const fone = cliente.telefone || '';
            const pontos = parseInt(cliente.pontos || 0, 10) || 0;

            document.getElementById('nome').value = nome;
            document.getElementById('telefone').value = fone;
            document.getElementById('user-name-display').innerText = nome || 'Visitante';
            document.getElementById('user-phone-display').innerText = fone || '--';

            if (nome) {
                document.getElementById('user-photo').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=db2777&color=fff`;
            }

            renderStamps(pontos);
        }

        async function loadUserData() {
            const local = clienteSession.obterCliente();
            preencherUI(local);

            try {
                if (local?.telefone_limpo || local?.telefone) {
                    const remoto = await clienteSession.carregarDoFirebase(local.telefone_limpo || local.telefone);
                    if (remoto) preencherUI(remoto);
                }
            } catch (erro) {
                console.warn('Nao foi possivel carregar perfil remoto:', erro);
            }
        }

        function renderStamps(pontos) {
            const pontosNum = parseInt(pontos || 0, 10) || 0;
            const grid = document.getElementById('stamps-grid');
            const premio = document.getElementById('premio-box');
            grid.innerHTML = '';
            document.getElementById('pontos-txt').innerText = pontosNum;
            premio.classList.toggle('hidden', pontosNum < 10);

            for (let i = 1; i <= 10; i++) {
                const filled = i <= pontosNum;
                const delay = i * 100;
                const stamp = document.createElement('div');
                stamp.className = `aspect-square rounded-full flex items-center justify-center border-2 ${filled ? 'border-brand-600 bg-brand-50' : 'border-gray-200 bg-gray-50'}`;

                if (filled) {
                    stamp.innerHTML = `<svg class="w-6 h-6 text-brand-600 stamp-animation" style="animation-delay: ${delay}ms" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
                } else {
                    stamp.innerHTML = `<span class="text-gray-300 text-xs font-bold">${i}</span>`;
                }
                grid.appendChild(stamp);
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value.trim();
            const fone = document.getElementById('telefone').value.trim();
            const telefoneLimpo = clienteSession.normalizarTelefone(fone);

            if (nome.length < 3) {
                alert('Digite um nome válido.');
                return;
            }
            if (telefoneLimpo.length < 10) {
                alert('Digite um WhatsApp válido.');
                return;
            }

            try {
                await clienteSession.sincronizar({
                    nome,
                    telefone: fone,
                    telefone_limpo: telefoneLimpo
                });

                alert('Perfil atualizado com sucesso!');
                await loadUserData();
            } catch (erro) {
                console.error(erro);
                alert('Erro ao salvar perfil. Tente novamente.');
            }
        });

        function logout() {
            if (confirm('Deseja sair?')) {
                clienteSession.logout();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
