<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="O melhor brownie da cidade. Peça e retire na loja.">
    <title>Delicia D'Brownie | App</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CONFETTI JS (Efeito de Celebração) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['DM Sans', 'sans-serif'], 
                        serif: ['Playfair Display', 'serif'] 
                    },
                    colors: { 
                        brand: { 
                            50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af', 
                            400: '#fb7185', 500: '#f43f5e', 600: '#db2777', 700: '#be123c', 800: '#9f1239',
                            gold: '#fbbf24'
                        } 
                    },
                    boxShadow: {
                        'up': '0 -4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(219, 39, 119, 0.3)'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-short': 'bounce 0.5s 1',
                        'float': 'float 3s ease-in-out infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.03); }
        .img-cover { width: 100%; height: 100%; object-fit: cover; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .heart-pop { animation: heartPop 0.3s ease-in-out; }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-24 md:pb-0 min-h-screen antialiased selection:bg-brand-100 selection:text-brand-900">

    <!-- HEADER -->
    <header class="fixed top-0 w-full z-40 glass-effect transition-all duration-300 pt-safe shadow-sm" id="main-header">
        <!-- Status Loja -->
        <div id="status-loja-bar" class="bg-red-600 text-white text-[10px] font-bold text-center py-1 hidden">
            <span id="status-text">LOJA FECHADA</span>
        </div>

        <div class="container mx-auto px-4 py-2">
            <!-- Topo -->
            <div class="flex justify-between items-center mb-3 mt-1">
                <div class="flex flex-col cursor-pointer" onclick="window.location.href='perfil.html'">
                    <span id="saudacao-usuario" class="text-xs font-bold text-brand-600 uppercase tracking-wide mb-0.5">Olá, Visitante</span>
                    
                    <!-- Mini Status Fidelidade -->
                    <div class="flex items-center gap-1 text-gray-900 group">
                        <span class="font-serif font-black text-lg leading-none">Meus Pontos</span>
                        <div class="flex items-center bg-brand-50 px-2 py-0.5 rounded-full border border-brand-100 group-hover:bg-brand-100 transition-colors">
                            <svg class="w-3 h-3 text-brand-600 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <span id="user-points-header" class="text-xs font-bold text-brand-700">0</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="filtrarFavoritos()" id="btn-header-fav" class="p-2 rounded-full text-gray-400 hover:text-brand-500 hover:bg-brand-50 transition-all">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    </button>

                    <button onclick="abrirCarrinho()" class="relative p-2 bg-gray-100 rounded-full hover:bg-brand-50 transition-colors group">
                        <svg id="cart-icon-svg" class="w-5 h-5 text-gray-800 group-hover:text-brand-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        <span id="badge-cart-desktop" class="absolute -top-1 -right-1 w-4 h-4 bg-brand-600 text-white text-[9px] font-bold flex items-center justify-center rounded-full scale-0 transition-transform border border-white">0</span>
                    </button>
                    
                     <a href="encomendas.html" class="hidden md:flex p-2 text-gray-400 hover:text-brand-600 transition" title="Encomendas">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </a>
                </div>
            </div>

            <!-- Busca -->
            <div class="relative group mb-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400 group-focus-within:text-brand-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="text" id="search-input" class="block w-full pl-10 pr-4 py-3 border-none rounded-xl bg-gray-100 text-gray-900 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:shadow-soft transition-all text-sm font-medium" placeholder="O que você deseja hoje?">
            </div>

            <form id="quick-login-form" class="mt-3 flex items-center gap-2 bg-white border border-gray-200 rounded-xl p-2">
                <input type="tel" id="quick-login-phone" class="flex-1 px-3 py-2 bg-gray-50 rounded-lg text-sm font-medium text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:bg-white" placeholder="Entrar com WhatsApp">
                <button type="submit" class="px-4 py-2 rounded-lg bg-gray-900 text-white text-xs font-bold active:scale-95 transition-transform">
                    Entrar
                </button>
            </form>
        </div>

        <!-- Menu Categorias -->
        <div class="border-t border-gray-50 bg-white/95 backdrop-blur-sm">
            <div id="nav-categorias" class="container mx-auto flex gap-3 overflow-x-auto hide-scroll py-3 px-4 scroll-smooth snap-x">
                <!-- Via JS -->
            </div>
            <div class="container mx-auto px-4 pb-3">
                <div class="text-[11px] font-bold text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 inline-flex items-center gap-1">
                    <span>Somente retirada na loja</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container mx-auto pt-[250px] md:pt-[260px] px-0 md:px-4 min-h-screen transition-all">
        
        <!-- BANNERS (Promo e Fidelidade) -->
        <section id="banners-container" class="mb-8 px-4 md:px-0 hidden animate-fade-in space-y-4">
            <!-- Banner Fidelidade -->
            <div onclick="window.location.href='perfil.html'" class="bg-gradient-to-r from-gray-900 to-gray-800 rounded-2xl p-4 text-white flex justify-between items-center shadow-lg cursor-pointer relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/10 rounded-full blur-xl group-hover:scale-150 transition-transform"></div>
                <div class="z-10">
                    <p class="text-[10px] font-bold text-brand-300 uppercase mb-1">CLUBE FIDELIDADE</p>
                    <h3 class="font-serif font-bold text-lg">Ganhe Brownies Grátis</h3>
                    <p class="text-xs text-gray-400">Acumule selos a cada compra!</p>
                </div>
                <div class="z-10 bg-white/20 backdrop-blur px-3 py-1.5 rounded-lg border border-white/10 flex flex-col items-center">
                    <span id="banner-points" class="text-xl font-black text-yellow-400">0</span>
                    <span class="text-[9px] font-bold uppercase">Pontos</span>
                </div>
            </div>
            
            <!-- Carrossel Destaques (Via JS) -->
            <div id="carrossel-destaques" class="flex gap-4 overflow-x-auto hide-scroll snap-x py-2"></div>
        </section>

        <!-- VITRINE -->
        <div class="px-4 md:px-0 mb-4 flex justify-between items-end">
            <h2 id="titulo-secao" class="text-xl font-serif font-black text-gray-900">Cardápio</h2>
            <button onclick="resetarFiltros()" id="btn-ver-todos" class="hidden text-xs font-bold text-brand-600 bg-brand-50 px-3 py-1 rounded-full">Ver todos</button>
        </div>

        <div id="main-vitrine" class="space-y-8 pb-10 min-h-[50vh]">
            <!-- Skeleton -->
            <div class="px-4 md:px-0 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="h-32 w-full bg-white rounded-2xl shadow-sm border border-gray-100 animate-pulse"></div>
                <div class="h-32 w-full bg-white rounded-2xl shadow-sm border border-gray-100 animate-pulse"></div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white/95 backdrop-blur-lg border-t border-gray-100 z-40 pb-safe shadow-up">
        <div class="flex justify-around items-center h-16 px-2">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center w-full text-brand-600 active:scale-90 transition-transform">
                <div class="relative">
                    <svg class="w-6 h-6 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h1v7c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-7h1a1 1 0 0 0 .707-1.707l-9-9a.999.999 0 0 0-1.414 0l-9 9A1 1 0 0 0 3 13zm9-8.586 6 6V15l.001 5H6v-9.586l6-6z"/><path d="M12 18c3.703 0 4.901-3.539 4.901-3.539C15.768 15.812 14.363 16 12 16c-2.408 0-3.808-.197-4.901-1.539C7.099 14.461 8.297 18 12 18z"/></svg>
                </div>
                <span class="text-[10px] font-bold">Início</span>
            </button>
            
            <button onclick="window.location.href='perfil.html'" class="flex flex-col items-center w-full text-gray-400 hover:text-brand-600 active:scale-90 transition-all">
                <svg class="w-6 h-6 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-[10px] font-medium">Perfil</span>
            </button>

            <button onclick="abrirCarrinho()" class="relative flex flex-col items-center w-full text-gray-400 hover:text-brand-600 active:scale-90 transition-all">
                <div class="relative">
                    <div id="cart-icon-mobile-bg" class="absolute inset-0 bg-brand-100 rounded-full scale-0 transition-transform"></div>
                    <svg id="cart-icon-mobile" class="w-6 h-6 mb-0.5 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="badge-cart-mobile" class="absolute -top-1 -right-2 min-w-[18px] h-[18px] bg-brand-600 text-white text-[10px] font-bold flex items-center justify-center rounded-full px-1 scale-0 transition-transform border-2 border-white z-20 shadow-sm">0</span>
                </div>
                <span class="text-[10px] font-medium">Sacola</span>
            </button>
            
            <button onclick="window.location.href='pedidos.html'" class="flex flex-col items-center w-full text-gray-400 hover:text-brand-600 active:scale-90 transition-all">
                <svg class="w-6 h-6 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <span class="text-[10px] font-medium">Pedidos</span>
            </button>
        </div>
    </nav>

    <!-- MODAL PRODUTO -->
    <div id="modal-produto" class="fixed inset-0 z-[60] hidden flex items-end md:items-center justify-center">
        <div onclick="toggleModal('modal-produto', false)" class="modal-overlay absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <div class="modal-content bg-white w-full md:max-w-lg rounded-t-3xl md:rounded-2xl overflow-hidden shadow-2xl transform translate-y-full md:translate-y-0 transition-transform duration-300 flex flex-col max-h-[90vh]">
            
            <div class="relative h-72 bg-gray-100 flex-shrink-0">
                <img id="modal-img" src="" class="img-cover">
                <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-black/60 to-transparent"></div>
                
                <button onclick="toggleModal('modal-produto', false)" class="absolute top-4 left-4 bg-black/20 text-white p-2 rounded-full backdrop-blur-md hover:bg-black/40 transition-colors active:scale-90">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>

                <button id="modal-btn-fav" class="absolute top-4 right-4 bg-white/20 text-white p-2 rounded-full backdrop-blur-md hover:bg-white/40 transition-all active:scale-75">
                    <!-- Icone Fav -->
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto">
                <div class="flex justify-between items-start mb-1">
                    <h2 id="modal-titulo" class="text-2xl font-serif font-black text-gray-900 leading-tight"></h2>
                </div>
                
                <!-- Avaliação (Fake Dinâmica) -->
                <div class="flex items-center gap-1 mb-4">
                    <div class="flex text-yellow-400">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    </div>
                    <span class="text-xs text-gray-500">(4.9/5.0)</span>
                </div>

                <p id="modal-desc" class="text-gray-500 leading-relaxed text-sm mb-6"></p>
                
                <div class="mb-6">
                    <label class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase mb-2">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        Observações
                    </label>
                    <textarea id="modal-obs" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-brand-500 focus:bg-white transition-colors" placeholder="Ex: Sem cebola, caprichar na calda..."></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-gray-100 bg-white pb-safe md:pb-4 shadow-up">
                <div class="flex items-center gap-4">
                    <div class="flex items-center bg-gray-100 rounded-xl h-12 px-1 border border-gray-200">
                        <button onclick="mudarQtd(-1)" class="w-12 h-full font-bold text-xl text-gray-500 hover:text-brand-600 active:scale-90 transition">-</button>
                        <span id="qtd-display" class="w-8 text-center font-bold text-gray-800 text-lg">1</span>
                        <button onclick="mudarQtd(1)" class="w-12 h-full font-bold text-xl text-brand-600 active:scale-90 transition">+</button>
                    </div>
                    <button onclick="addAoCarrinho()" id="btn-add-modal" class="flex-1 bg-brand-600 text-white h-12 rounded-xl font-bold shadow-lg shadow-brand-200 active:scale-95 transition-all flex justify-between items-center px-6">
                        <span>Adicionar</span>
                        <span id="modal-btn-preco">R$ 0,00</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CARRINHO -->
    <div id="modal-carrinho" class="fixed inset-0 z-[70] hidden flex items-end justify-end">
        <div onclick="toggleModal('modal-carrinho', false)" class="modal-overlay absolute inset-0 bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <div class="modal-content bg-white w-full md:w-[450px] h-[90vh] md:h-full flex flex-col transform translate-y-full md:translate-y-0 md:translate-x-full transition-transform duration-300 shadow-2xl md:rounded-l-2xl rounded-t-2xl">
            
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white z-10">
                <h2 class="text-xl font-serif font-black text-gray-900">Sua Sacola (Retirada)</h2>
                <button onclick="toggleModal('modal-carrinho', false)" class="text-gray-400 hover:text-gray-600 bg-gray-50 p-2 rounded-full">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div id="lista-carrinho" class="flex-grow overflow-y-auto p-5 space-y-4 bg-white">
                <!-- Itens -->
            </div>
            
            <!-- Área de Cupom e Fidelidade no Carrinho -->
            <div class="px-6 pt-2 bg-gray-50">
                <div class="flex items-center gap-2 text-xs text-brand-600 bg-brand-50 p-2 rounded border border-brand-100">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="font-bold">+1 Ponto Fidelidade será adicionado</span>
                </div>
