<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Meus Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#ec4899', 600: '#db2777' } },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        .skeleton { background: #f3f4f6; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0.5) 20%, rgba(255, 255, 255, 0.8) 60%, rgba(255, 255, 255, 0));
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM9tMvnRV-o7X66euCBKuLmuz-kIrClWY",
            authDomain: "renata-26079.firebaseapp.com",
            projectId: "renata-26079",
            storageBucket: "renata-26079.firebasestorage.app",
            messagingSenderId: "995787482442",
            appId: "1:995787482442:web:fdbca404a0e251cc278db3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        
        const formatarData = (iso) => {
            if(!iso) return '--/--';
            const d = new Date(iso);
            return `${d.getDate()}/${d.getMonth()+1} às ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const userPhone = localStorage.getItem('userPhone');
            
            if (!userPhone) {
                document.getElementById('lista-historico').innerHTML = `
                    <div class="text-center py-10 px-4">
                        <p class="text-gray-500 mb-4">Não identificamos seu número.</p>
                        <a href="perfil.html" class="bg-brand-600 text-white px-6 py-3 rounded-lg font-bold">Fazer Login</a>
                    </div>`;
                return;
            }

            carregarHistorico(userPhone);

            // Botão recarregar
            document.getElementById('btn-refresh').addEventListener('click', () => {
                document.getElementById('lista-historico').innerHTML = '';
                carregarHistorico(userPhone);
            });
        });

        function carregarHistorico(telefone) {
            const lista = document.getElementById('lista-historico');
            
            // Skeleton Loading inicial
            lista.innerHTML = `<div class="skeleton h-24 w-full rounded-xl mb-4"></div><div class="skeleton h-24 w-full rounded-xl"></div>`;

            console.log("Buscando pedidos para:", telefone);

            // CORREÇÃO PRINCIPAL AQUI:
            // Removemos o .orderBy('data') daqui para evitar o erro de índice do Firebase.
            // Vamos ordenar via JavaScript depois que os dados chegarem.
            db.collection('pedidos')
                .where('cliente_telefone_limpo', '==', telefone)
                .limit(20) 
                .get()
                .then(snap => {
                    lista.innerHTML = ''; // Limpa o loading

                    if (snap.empty) {
                        lista.innerHTML = `
                            <div class="text-center py-16 text-gray-400">
                                <svg class="w-16 h-16 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                                <p>Nenhum pedido encontrado.</p>
                                <p class="text-xs mt-2">Seu número cadastrado é: ${telefone}</p>
                            </div>`;
                        return;
                    }

                    // 1. Converte para lista normal
                    let pedidos = [];
                    snap.forEach(doc => pedidos.push(doc.data()));

                    // 2. Ordena aqui (Do mais novo para o mais antigo)
                    pedidos.sort((a, b) => new Date(b.data) - new Date(a.data));

                    // 3. Renderiza na tela
                    pedidos.forEach(p => {
                        // Cores do status
                        let statusColor = 'bg-blue-50 text-blue-600';
                        let statusIcon = '<svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                        
                        if(p.status === 'Produzindo') {
                            statusColor = 'bg-yellow-50 text-yellow-600';
                            statusIcon = '<svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>';
                        } else if (p.status === 'Finalizado') {
                            statusColor = 'bg-green-50 text-green-600';
                            statusIcon = '<svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                        }

                        // Resumo itens
                        const resumo = p.itens.map(i => `${i.qtd}x ${i.nome}`).join(', ');

                        lista.innerHTML += `
                        <div class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-100 animate-fade-in">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded">${p.id_visual || '#000'}</span>
                                <span class="flex items-center ${statusColor} text-xs font-bold px-3 py-1 rounded-full">
                                    ${statusIcon} ${p.status}
                                </span>
                            </div>
                            <div class="mb-3">
                                <p class="text-sm text-gray-600 line-clamp-2">${resumo}</p>
                            </div>
                            <div class="flex justify-between items-center border-t border-gray-50 pt-3">
                                <span class="text-xs text-gray-400 font-medium">${formatarData(p.data)}</span>
                                <span class="font-bold text-gray-900">${formatarMoeda(p.total)}</span>
                            </div>
                        </div>`;
                    });
                })
                .catch(err => {
                    console.error("Erro Firebase:", err);
                    lista.innerHTML = `<div class="bg-red-50 text-red-500 p-4 rounded-xl text-center text-sm">Erro ao buscar pedidos.<br>${err.message}</div>`;
                });
        }
    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 pb-24">

    <header class="bg-white sticky top-0 z-10 px-4 py-4 border-b border-gray-100 flex justify-between items-center shadow-sm">
        <h1 class="text-lg font-bold text-gray-800">Meus Pedidos</h1>
        <button id="btn-refresh" class="p-2 text-gray-400 hover:text-brand-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
    </header>

    <main class="container mx-auto p-4 max-w-md" id="lista-historico">
        <!-- JS injeta aqui -->
    </main>

    <!-- Bottom Nav -->
    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 z-40 pb-safe">
        <nav class="flex justify-around items-center p-1">
            <a href="index.html" class="flex flex-col items-center w-16 py-2 text-gray-400 hover:text-brand-600 transition">
                <svg class="h-6 w-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                <span class="text-[10px] font-medium">Início</span>
            </a>
            <a href="pedidos.html" class="flex flex-col items-center w-16 py-2 text-brand-600 font-bold">
                <svg class="h-6 w-6 mb-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
                <span class="text-[10px]">Pedidos</span>
            </a>
            <a href="perfil.html" class="flex flex-col items-center w-16 py-2 text-gray-400 hover:text-brand-600 transition">
                <div class="h-6 w-6 mb-0.5 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-500">?</div>
                <span class="text-[10px] font-medium">Perfil</span>
            </a>
        </nav>
    </footer>
</body>
</html>
