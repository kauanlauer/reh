<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1f2937">
    <title>Gestão de Clientes | Admin</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

    <script>
        // Configuração do Tailwind (Mesma do projeto)
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 
                        brand: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#ec4899', 600: '#db2777', 800: '#9d174d' } 
                    }
                }
            }
        }
    </script>

    <style>
        /* Estilos Personalizados */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .pb-safe-area { padding-bottom: env(safe-area-inset-bottom); }
    </style>

    <script>
        const db = window.db;
        const auth = window.auth;

        // --- ESTADO ---
        let clientesCache = [];
        let editandoId = null;

        // --- LIFECYCLE ---
        document.addEventListener('DOMContentLoaded', () => {
            if (!db || !auth) {
                alert('Erro ao iniciar Firebase. Recarregue a página.');
                return;
            }

            auth.onAuthStateChanged(user => { if (!user) auth.signInAnonymously(); });
            
            carregarClientes();

            // Listeners
            document.getElementById('search-input').addEventListener('input', filtrarClientes);
            document.getElementById('form-cliente').addEventListener('submit', salvarCliente);

            // Máscara de Telefone no Input
            const inputFone = document.getElementById('telefone');
            inputFone.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                e.target.value = v;
            });
        });

        // --- FUNÇÕES DE DADOS ---
        function carregarClientes() {
            const grid = document.getElementById('grid-clientes');
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400 animate-pulse">Carregando clientes...</div>';

            // Escuta em tempo real
            db.collection('clientes').orderBy('nome').onSnapshot(snap => {
                clientesCache = [];
                snap.forEach(doc => {
                    clientesCache.push({ id: doc.id, ...doc.data() });
                });
                renderizarGrid(clientesCache);
                atualizarStats(clientesCache);
            });
        }

        function renderizarGrid(lista) {
            const grid = document.getElementById('grid-clientes');
            grid.innerHTML = '';

            if (lista.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
                        <svg class="w-16 h-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        <p>Nenhum cliente encontrado.</p>
                    </div>`;
                return;
            }

            // Layout Grid Responsivo
            grid.className = 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 pb-20';

            lista.forEach(c => {
                const dadosJson = encodeURIComponent(JSON.stringify(c));
                const ultimoAcesso = c.ultimo_acesso ? new Date(c.ultimo_acesso).toLocaleDateString('pt-BR') : 'Nunca';
                const pontos = parseInt(c.pontos || 0, 10) || 0;
                const totalPedidos = parseInt(c.total_pedidos || 0, 10) || 0;

                grid.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow flex items-center gap-4 group">
                    <!-- Avatar com Inicial -->
                    <div class="w-12 h-12 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center font-bold text-xl flex-shrink-0 border border-brand-100">
                        ${c.nome.charAt(0).toUpperCase()}
                    </div>

                    <!-- Info -->
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-gray-800 text-lg truncate">${c.nome}</h3>
                        <div class="flex items-center gap-1 text-gray-500 text-sm">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                            <span>${c.telefone || 'Sem fone'}</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">Acesso: ${ultimoAcesso}</p>
                        <div class="mt-1 flex items-center gap-2">
                            <span class="text-[11px] font-bold text-brand-600 bg-brand-50 border border-brand-100 px-2 py-0.5 rounded-full">${pontos} pontos</span>
                            <span class="text-[11px] font-bold text-gray-600 bg-gray-100 border border-gray-200 px-2 py-0.5 rounded-full">${totalPedidos} pedidos</span>
                        </div>
                        <div class="mt-2 flex items-center gap-2">
                            <button onclick="ajustarPontos('${c.id}', -1)" class="px-2 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition">-1 ponto</button>
                            <button onclick="ajustarPontos('${c.id}', 1)" class="px-2 py-1 text-xs font-bold rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition">+1 ponto</button>
                        </div>
                    </div>

                    <!-- Ações -->
                    <div class="flex flex-col gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                        <button onclick="abrirDrawer('${dadosJson}')" class="p-2 bg-gray-50 text-blue-600 rounded-lg hover:bg-blue-50 transition" title="Editar">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </button>
                        <button onclick="deletarCliente('${c.id}')" class="p-2 bg-gray-50 text-red-500 rounded-lg hover:bg-red-50 transition" title="Excluir">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            });
        }

        function filtrarClientes() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const filtrados = clientesCache.filter(c => 
                c.nome.toLowerCase().includes(termo) || 
                (c.telefone && c.telefone.includes(termo))
            );
            renderizarGrid(filtrados);
        }

        // --- DRAWER (Formulário) ---
        function abrirDrawer(dadosJson = null) {
            const drawer = document.getElementById('drawer-form');
            const overlay = document.getElementById('drawer-overlay');
            const titulo = document.getElementById('drawer-title');
            
            limparFormulario();

            if (dadosJson) {
                const c = JSON.parse(decodeURIComponent(dadosJson));
                editandoId = c.id;
                titulo.innerText = "Editar Cliente";
                document.getElementById('nome').value = c.nome || '';
                document.getElementById('telefone').value = c.telefone || '';
                document.getElementById('pontos').value = parseInt(c.pontos || 0, 10) || 0;
            } else {
                editandoId = null;
                titulo.innerText = "Novo Cliente";
                document.getElementById('pontos').value = 0;
            }

            drawer.classList.remove('hidden');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.style.transform = 'none';
            }, 10);
        }

        function fecharDrawer() {
            const drawer = document.getElementById('drawer-form');
            const overlay = document.getElementById('drawer-overlay');
            drawer.style.transform = ''; 
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                drawer.classList.add('hidden');
                overlay.classList.add('hidden');
            }, 300);
        }

        function limparFormulario() {
            document.getElementById('form-cliente').reset();
            editandoId = null;
        }

        async function salvarCliente(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            const originalText = btn.innerText;
            btn.innerText = 'Salvando...';
            btn.disabled = true;

            try {
                const nome = document.getElementById('nome').value.trim();
                const telefone = document.getElementById('telefone').value.trim();
                const telefoneLimpo = telefone.replace(/\D/g, '');
                const pontos = parseInt(document.getElementById('pontos').value || '0', 10);

                if (nome.length < 3) throw new Error("Nome muito curto.");
                if (telefoneLimpo.length < 10) throw new Error("Telefone inválido.");
                if (pontos < 0) throw new Error("Pontos não pode ser negativo.");

                const dados = {
                    nome,
                    telefone,
                    telefone_limpo: telefoneLimpo,
                    pontos: pontos || 0,
                    ultimo_acesso: new Date().toISOString()
                };

                if (editandoId) {
                    if (editandoId !== telefoneLimpo) {
                        const destinoRef = db.collection('clientes').doc(telefoneLimpo);
                        const destinoSnap = await destinoRef.get();
                        if (destinoSnap.exists) throw new Error("Já existe cliente com o novo telefone.");

                        const origemRef = db.collection('clientes').doc(editandoId);
                        const origemSnap = await origemRef.get();
                        const origemData = origemSnap.exists ? origemSnap.data() : {};

                        await destinoRef.set({ ...origemData, ...dados }, { merge: true });
                        await origemRef.delete();
                        editandoId = telefoneLimpo;
                    } else {
                        await db.collection('clientes').doc(editandoId).update(dados);
                    }
                    mostrarToast("Cliente atualizado!", "sucesso");
                } else {
                    dados.data_cadastro = new Date().toISOString();
                    dados.total_pedidos = 0;
                    dados.total_gasto = 0;

                    const ref = db.collection('clientes').doc(telefoneLimpo);
                    const existente = await ref.get();
                    if (existente.exists) throw new Error("Já existe um cliente com este telefone.");

                    await ref.set(dados, { merge: true });
                    mostrarToast("Cliente cadastrado!", "sucesso");
                }
                fecharDrawer();

            } catch (erro) {
                alert(erro.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function deletarCliente(id) {
            if(confirm("Tem certeza que deseja excluir este cliente? O histórico de acesso será perdido.")) {
                try {
                    await db.collection('clientes').doc(id).delete();
                    mostrarToast("Cliente removido.", "erro");
                } catch(e) { alert("Erro: " + e.message); }
            }
        }

        async function ajustarPontos(id, delta) {
            try {
                const ref = db.collection('clientes').doc(id);
                const snap = await ref.get();
                if (!snap.exists) {
                    throw new Error("Cliente não encontrado.");
                }

                const atual = parseInt(snap.data().pontos || 0, 10) || 0;
                const novoValor = Math.max(0, atual + delta);

                await ref.update({
                    pontos: novoValor,
                    ultimo_acesso: new Date().toISOString()
                });

                mostrarToast(`Pontos atualizados: ${novoValor}`, "sucesso");
            } catch (e) {
                alert("Erro ao ajustar pontos: " + e.message);
            }
        }

        function atualizarStats(lista) {
            document.getElementById('total-clientes').innerText = lista.length;
        }

        function mostrarToast(msg, tipo = 'sucesso') {
            const t = document.getElementById('toast');
            const cor = tipo === 'sucesso' ? 'bg-gray-900' : 'bg-red-600';
            t.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold shadow-2xl z-[100] transition-all duration-500 translate-y-20 opacity-0 ${cor}`;
            t.innerHTML = `<span>${tipo === 'sucesso' ? '✓' : '🗑️'}</span> ${msg}`;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="glass-header h-16 flex items-center justify-between px-4 md:px-8 z-30 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-brand-600 text-white p-1.5 rounded-lg">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            </div>
            <h1 class="font-bold text-gray-800 text-lg tracking-tight">Admin <span class="text-gray-400 mx-1">/</span> Clientes</h1>
        </div>

        <nav class="flex gap-2 md:gap-4">
            <!-- LINKS DE NAVEGAÇÃO (Sem target="_blank") -->
            <a href="admin-pedidos.html" class="px-3 py-2 text-sm font-bold text-gray-500 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition flex items-center gap-2">
                <span class="hidden md:inline">Pedidos</span>
                <svg class="w-4 h-4 md:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            </a>
            <a href="admin-produtos.html" class="px-3 py-2 text-sm font-bold text-gray-500 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition flex items-center gap-2">
                <span class="hidden md:inline">Produtos</span>
                <svg class="w-4 h-4 md:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
            </a>
            <a href="admin-custos.html"
                class="px-3 py-2 text-sm font-bold text-gray-500 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition flex items-center gap-2">
                <span class="hidden md:inline">Custos</span>
                <svg class="w-4 h-4 md:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
            </a>
            <!-- Link para a Loja continua com target="_blank" para não fechar o admin -->
            <a href="index.html" target="_blank" class="hidden md:flex px-3 py-2 text-sm font-bold text-brand-600 bg-brand-50 border border-brand-100 rounded-lg hover:bg-brand-100 transition items-center gap-2">
                <span>Ver Loja</span>
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
        </nav>
    </header>

    <!-- TOOLBAR -->
    <div class="bg-white border-b border-gray-200 px-4 md:px-8 pt-4 pb-4 flex flex-col md:flex-row gap-4 justify-between items-center flex-shrink-0">
        <div class="flex gap-4 items-center w-full md:w-auto">
            <div class="bg-gray-100 px-3 py-1 rounded-lg border border-gray-200">
                <span class="text-xs font-bold text-gray-400 uppercase">Total</span>
                <span id="total-clientes" class="ml-1 font-black text-gray-800">0</span>
            </div>
        </div>

        <div class="flex w-full md:w-auto gap-3">
            <div class="relative flex-grow md:w-64">
                <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="search-input" placeholder="Buscar cliente..." class="w-full pl-10 pr-4 py-3 bg-gray-100 border-transparent focus:bg-white focus:border-brand-500 focus:ring-0 rounded-xl text-sm transition font-medium">
            </div>
            <button onclick="abrirDrawer()" class="bg-brand-600 text-white px-4 py-3 rounded-xl font-bold text-sm hover:bg-brand-700 shadow-lg shadow-brand-200 transition active:scale-95 flex-shrink-0">
                + Novo
            </button>
        </div>
    </div>

    <!-- GRID -->
    <main class="flex-grow overflow-y-auto p-4 md:p-8 bg-gray-50">
        <div id="grid-clientes">
            <!-- Renderizado via JS -->
        </div>
    </main>

    <!-- DRAWER (FORMULÁRIO) -->
    <div id="drawer-overlay" onclick="fecharDrawer()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    
    <div id="drawer-form" class="fixed z-50 bg-white shadow-2xl transition-transform duration-300 flex flex-col hidden
        bottom-0 left-0 right-0 w-full h-[80vh] rounded-t-2xl md:h-full
        md:inset-y-0 md:right-0 md:left-auto md:w-[400px] md:rounded-l-2xl md:rounded-tr-none translate-y-full md:translate-x-full">
        
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white flex-shrink-0">
            <h2 id="drawer-title" class="text-xl font-serif font-bold text-gray-900">Cliente</h2>
            <button onclick="fecharDrawer()" class="p-2 text-gray-400 hover:text-gray-600 bg-gray-50 rounded-full transition">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="flex-grow overflow-y-auto p-6 space-y-6">
            <form id="form-cliente" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full p-3 border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-0 outline-none font-bold text-gray-800" placeholder="Ex: Maria Silva">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Celular / WhatsApp</label>
                    <input type="tel" id="telefone" required class="w-full p-3 border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-0 outline-none font-bold text-gray-800" placeholder="(00) 00000-0000" maxlength="15">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Pontos Fidelidade</label>
                    <input type="number" id="pontos" min="0" step="1" value="0" class="w-full p-3 border border-gray-200 rounded-xl focus:border-brand-500 focus:ring-0 outline-none font-bold text-gray-800">
                </div>
            </form>
        </div>

        <div class="p-6 border-t border-gray-100 bg-white pb-safe-area flex-shrink-0">
            <button form="form-cliente" type="submit" id="btn-salvar" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-200 hover:bg-brand-700 active:scale-95 transition">
                Salvar Cliente
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

</body>
</html>
